{{ if .Site.Params.comments.giscus.enable }}
<div class="comments" id="giscus-comments">
  <script>
    (() => {
      const config = {{ dict
        "repo" .Site.Params.comments.giscus.repo
        "repoId" .Site.Params.comments.giscus.repo_id
        "category" .Site.Params.comments.giscus.category
        "categoryId" .Site.Params.comments.giscus.category_id
        "mapping" (.Site.Params.comments.giscus.mapping | default "pathname")
        "position" (.Site.Params.comments.giscus.position | default "top")
        "lang" (.Site.Params.comments.giscus.lang | default .Language.Lang)
        "darkModeTheme" (.Site.Params.darkModeTheme | default "data-dark-mode")
        | jsonify | safeJS }};
      const isDark = document.documentElement.hasAttribute(config.darkModeTheme);
      const script = document.createElement('script');
      script.src = 'https://giscus.app/client.js';
      script.dataset.repo = config.repo;
      script.dataset.repoId = config.repoId;
      script.dataset.category = config.category;
      script.dataset.categoryId = config.categoryId;
      script.dataset.mapping = config.mapping;
      script.dataset.strict = '0';
      script.dataset.reactionsEnabled = '1';
      script.dataset.emitMetadata = '0';
      script.dataset.inputPosition = config.position;
      script.dataset.theme = isDark ? 'dark' : 'light';
      script.dataset.lang = config.lang;
      script.dataset.loading = 'lazy';
      script.crossOrigin = 'anonymous';
      script.async = true;
      document.getElementById('giscus-comments').appendChild(script);
    })();
  </script>
</div>
{{ end }}
