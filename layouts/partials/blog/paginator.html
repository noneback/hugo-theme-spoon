{{ $pages := where site.RegularPages "Type" "in" site.Params.mainSections }}
{{ if and (gt (len $pages) 1) (in $pages . ) }}
<nav class="paginator" aria-label="{{ i18n "article_navigation" }}">
  {{ with $pages.Next . }}
  <a class="prev" href="{{ .RelPermalink }}" rel="prev">
    <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>{{ .Title }}</span>
  </a>
  {{ end }}
  {{ with $pages.Prev . }}
  <a class="next" href="{{ .RelPermalink }}" rel="next">
    <span>{{ .Title }}</span>
    <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
  {{ end }}
</nav>
{{ end }}
